<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Gradient Background -->

  <defs>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">

      <stop offset="0%" stop-color="#ff4d8d"/>

      <stop offset="100%" stop-color="#ff1a1a"/>

    </linearGradient>



    <!-- Subtle 3D Shadow -->

    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">

      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>

    </filter>

  </defs>



  <!-- Import Archivo Font -->

  <style>

    @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@700&display=swap');

  </style>



  <!-- Rounded Background -->

  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#bgGrad)"/>



  <!-- Text -->

  <text x="50" y="55"

        text-anchor="middle"

        dominant-baseline="middle"

        font-family="'Archivo', sans-serif"

        font-size="20"

        font-weight="700"

        letter-spacing="0.6"

        fill="white"

        filter="url(#textShadow)">

    FolCam

  </text>

</svg>
